name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-mod:
    name: Build NeoForge Mod
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Build mod
        working-directory: mod
        run: gradle build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx3g"

      - name: Upload mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: proximitychat-mod
          path: mod/build/libs/*.jar

      - name: Copy mod to dist
        run: |
          mkdir -p dist
          cp mod/build/libs/*.jar dist/
          rm -f dist/*-sources.jar

      - name: Commit and push dist
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet || git commit -m "chore: update built mod artifacts"
          git push

  build-bridge-exe:
    name: Package Bridge Executables (pkg)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: bridge/package-lock.json

      - name: Install dependencies
        working-directory: bridge
        run: npm ci

      - name: Build executables
        working-directory: bridge
        run: npm run build

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: proximityvc-bridge-windows
          path: bridge/proximityvc-bridge-win.exe

      - name: Upload Linux executable
        uses: actions/upload-artifact@v4
        with:
          name: proximityvc-bridge-linux
          path: bridge/proximityvc-bridge-linux

      - name: Upload macOS executable
        uses: actions/upload-artifact@v4
        with:
          name: proximityvc-bridge-macos
          path: bridge/proximityvc-bridge-macos

  build-bridge:
    name: Build Node.js Bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bridge/package-lock.json

      - name: Install dependencies
        working-directory: bridge
        run: npm ci

      - name: Check syntax
        working-directory: bridge
        run: |
          node --check index.js
          node --check discordRpc.js
