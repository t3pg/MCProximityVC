name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-mod:
    name: Build NeoForge Mod
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
          cache-read-only: false

      - name: Build mod
        working-directory: mod
        run: gradle build --no-daemon --build-cache
        env:
          GRADLE_OPTS: "-Xmx3g"

      - name: Upload mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: proximitychat-mod
          path: mod/build/libs/*.jar

      - name: Copy mod to dist
        run: |
          mkdir -p dist
          cp mod/build/libs/*.jar dist/
          rm -f dist/*-sources.jar

      - name: Commit and push dist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet || git commit -m "chore: update built mod artifacts"
          git push

  build-bridge-exe:
    name: Package Bridge (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node20-linux-x64
            output: proximityvc-bridge-linux
            artifact_name: proximityvc-bridge-linux
          - os: windows-latest
            target: node20-win-x64
            output: proximityvc-bridge-win.exe
            artifact_name: proximityvc-bridge-windows
          - os: macos-latest
            target: node20-macos-x64
            output: proximityvc-bridge-macos
            artifact_name: proximityvc-bridge-macos
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bridge/package-lock.json

      - name: Cache pkg binaries
        uses: actions/cache@v4
        with:
          path: ~/.pkg-cache
          key: pkg-cache-${{ matrix.target }}-v1

      - name: Install dependencies
        working-directory: bridge
        run: npm ci

      - name: Build executable
        working-directory: bridge
        env:
          PKG_CACHE_PATH: ~/.pkg-cache
        run: npx pkg . --target ${{ matrix.target }} --output ${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bridge/${{ matrix.output }}

  build-bridge:
    name: Build Node.js Bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bridge/package-lock.json

      - name: Install dependencies
        working-directory: bridge
        run: npm ci

      - name: Check syntax
        working-directory: bridge
        run: |
          node --check index.js
          node --check discordRpc.js
