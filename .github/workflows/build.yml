name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-mod:
    name: Build NeoForge Mod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Generate Gradle wrapper
        working-directory: mod
        run: gradle wrapper --gradle-version=8.8

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mod
        working-directory: mod
        run: ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx3g"

      - name: Upload mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: proximitychat-mod
          path: mod/build/libs/*.jar

  build-bridge:
    name: Build Node.js Bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bridge/package-lock.json

      - name: Install dependencies
        working-directory: bridge
        run: npm ci

      - name: Check syntax
        working-directory: bridge
        run: |
          node --check index.js
          node --check discordRpc.js
